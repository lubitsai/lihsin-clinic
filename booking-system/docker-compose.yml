# 立欣診所預約系統 — 正式部署（app + PostgreSQL）
# 使用方式見 docs/06-部署與備份.md
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lihsin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?請在 .env 設定 POSTGRES_PASSWORD}
      POSTGRES_DB: lihsin_booking
      TZ: Asia/Taipei
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lihsin -d lihsin_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lihsin:${POSTGRES_PASSWORD}@db:5432/lihsin_booking
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000" # 由反向代理（Caddy/Nginx）對外提供 HTTPS

  # 每日提醒排程（day-before 19:00、same-day 08:00，時間可依系統設定調整）
  reminder:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lihsin:${POSTGRES_PASSWORD}@db:5432/lihsin_booking
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "while true; do
        H=$$(TZ=Asia/Taipei date +%H:%M);
        if [ \"$$H\" = \"19:00\" ]; then node node_modules/tsx/dist/cli.mjs scripts/send-reminders.ts day-before; fi;
        if [ \"$$H\" = \"08:00\" ]; then node node_modules/tsx/dist/cli.mjs scripts/send-reminders.ts same-day; fi;
        sleep 60;
      done"

  # 每日 03:30 自動備份，保留 30 天（備份檔在 ./backups）
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Taipei
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "while true; do
        H=$$(date +%H:%M);
        if [ \"$$H\" = \"03:30\" ]; then
          pg_dump -h db -U lihsin -Fc lihsin_booking > /backups/lihsin_booking_$$(date +%Y%m%d).dump &&
          find /backups -name '*.dump' -mtime +30 -delete &&
          echo \"backup done $$(date)\";
          sleep 61;
        fi;
        sleep 30;
      done"

volumes:
  pgdata:
