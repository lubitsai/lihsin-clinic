# уХ▓уФЎтЂЦТфб:уиџСИіТфбТИг(УЄеТЎѓ workflow,тЂЦТфбТЅ╣т░ѕуће)
# ућежђћ:session уХ▓Уи»Тћ┐уГќСИЇтљФТюгуФЎуХ▓тЪЪ,тђЪ GitHub Actions runner т░ЇТГБт╝ЈуФЎ
#       тЂџ SSL/т«ЅтЁеТеЎжаГ/тЁе sitemap уІђТЁІ/тцќжЃежђБухљ/PageSpeed Insights ТфбТИгсђѓ
# УДИуЎ╝:push тѕ░тЂЦТфбтѕєТћ»(workflow_dispatch жюђТфћТАѕтГўтюеТќ╝ main ТЅЇтЈ»уће,
#       ТЋЁС╗Ц push УДИуЎ╝);ТфбТИгт«їТѕљтЙїТюгТфћтЈ»уД╗жЎцсђѓ
name: Website health check (live)

on:
  workflow_dispatch:
  push:
    branches: [claude/website-health-check-0sht03]

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: 1. SSL certificate and TLS
        run: |
          H=lhpedclinic.com.tw
          echo "=== SSL ТєЉУГЅ ==="
          echo | openssl s_client -connect $H:443 -servername $H 2>/dev/null > /tmp/cert.pem || true
          openssl x509 -in /tmp/cert.pem -noout -subject -issuer -startdate -enddate || true
          end=$(openssl x509 -in /tmp/cert.pem -noout -enddate | cut -d= -f2)
          echo "тЅЕжцўтцЕТЋИ: $(( ($(date -d "$end" +%s) - $(date +%s)) / 86400 ))"
          echo "=== SAN ==="
          openssl x509 -in /tmp/cert.pem -noout -ext subjectAltName || true
          echo "=== TLS тЇћт«џТћ»ТЈ┤(УѕіуЅѕТЄЅСИЇТћ»ТЈ┤)==="
          for v in tls1 tls1_1 tls1_2 tls1_3; do
            if echo | openssl s_client -$v -connect $H:443 -servername $H >/dev/null 2>&1; then
              echo "$v: Тћ»ТЈ┤"
            else
              echo "$v: СИЇТћ»ТЈ┤"
            fi
          done

      - name: 2. Security headers
        run: |
          B=https://lhpedclinic.com.tw
          echo "=== ждќжаЂтЏъТЄЅТеЎжаГ ==="
          curl -sI --max-time 20 "$B/" | tr -d '\r'
          echo "=== httpРєњhttps УйЅтЮђ ==="
          curl -sI --max-time 20 "http://lhpedclinic.com.tw/" | tr -d '\r' | head -6
          echo "=== wwwРєњжЮъ www УйЅтЮђ ==="
          curl -sI --max-time 20 "https://www.lhpedclinic.com.tw/" | tr -d '\r' | head -6
          echo "=== тюќуЅЄт┐ФтЈќТеЎжаГ ==="
          curl -sI --max-time 20 "$B/images/logo.png" | tr -d '\r' | grep -iE 'cache-control|content-type|age' || true

      - name: 3. All sitemap URLs status
        run: |
          B=https://lhpedclinic.com.tw
          curl -s --max-time 20 "$B/sitemap.xml" > /tmp/sitemap.xml
          urls=$(grep -oE '<loc>[^<]+</loc>' /tmp/sitemap.xml | sed 's/<[^>]*>//g')
          echo "sitemap URL ТЋИ: $(echo "$urls" | wc -l)"
          fail=0
          for u in $urls; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$u")
            if [ "$code" = "200" ]; then mark="OK  "; else mark="FAIL"; fail=1; fi
            echo "$mark $code $u"
          done
          echo "sitemap уІђТЁІТфбТЪЦ fail=$fail"

      - name: 4. Internal file interception (should 404)
        run: |
          B=https://lhpedclinic.com.tw
          for p in /CLAUDE.md /.mcp.json /internal/00_%E5%B0%88%E6%A1%88%E7%B8%BD%E8%A6%BD%E7%B4%A2%E5%BC%95.md /.github/workflows/health-check-live.yml /_gitignore; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$B$p")
            [ "$code" = "404" ] && mark="OK  " || mark="FAIL"
            echo "$mark $code (expect 404) $p"
          done
          code=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 20 "$B/health/no-such-page")
          [ "$code" = "404" ] && echo "OK   $code (expect 404) /health/no-such-page" || echo "FAIL $code /health/no-such-page"

      - name: 5. External links status
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          check() {  # curl тц▒ТЋЌ(тдѓт░ЇТќ╣ТєЉУГЅжЈѕСИЇт«їТЋ┤)тЏъ 000,СИЇСИГТќиТЋ┤тђІ job
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 -L -A "$UA" "$1" || true)
            echo "$code $1"
          }
          echo "=== уФЎтЁДт╝ЋућеС╣ІтцќжЃежђБухљ ==="
          check "https://g.page/r/Cf4ZUvGDLbD3EBM/review"
          check "https://line.me/R/ti/p/@lhpedclinic"
          check "https://www.facebook.com/lhpedclinic"
          check "https://www.instagram.com/lhpedclinic/"
          check "https://www.mainpi.com/query?i=2935"
          check "https://www.cdc.gov.tw/"
          check "https://www.hpa.gov.tw/"
          check "https://www.air.org.tw/"
          check "https://www.pediatr.org.tw/"
          check "https://www.google.com/maps/dir/?api=1&destination=%E7%AB%8B%E6%AC%A3%E8%A8%BA%E6%89%80+%E5%8F%B0%E5%8D%97%E5%B8%82%E5%8C%97%E5%8D%80%E8%82%B2%E5%BE%B7%E8%B7%AF467%E8%99%9F"
          check "https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
          echo "=== JSON-LD sameAs уХГтЪ║т»джФћ(ТійТИг)==="
          check "https://zh.wikipedia.org/wiki/%E4%BB%A3%E8%AC%9D%E7%97%87%E5%80%99%E7%BE%A4"
          check "https://zh.wikipedia.org/wiki/%E9%81%8E%E6%95%8F"
          check "https://en.wikipedia.org/wiki/Human_metapneumovirus"

      - name: 6. Lighthouse CWV (runner-local, PSI API уёАжЄЉжЉ░жЁЇжАЇСИЇтЈ»уће)
        run: |
          # тЁѕтЇ░СИђТгА PSI API жї»УфцтјЪтЏаСЙЏу┤ђжїё
          curl -s --max-time 60 "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=https://lhpedclinic.com.tw/&strategy=mobile" | head -c 400 || true
          echo ""
          npm i -g lighthouse@12 >/dev/null 2>&1
          lh() {  # $1=url $2=mobile|desktop
            echo "РћђРћђРћђРћђ Lighthouse $2: $1 РћђРћђРћђРћђ"
            preset=""
            [ "$2" = "desktop" ] && preset="--preset=desktop"
            lighthouse "$1" $preset --only-categories=performance \
              --output=json --output-path=/tmp/lh.json --quiet \
              --chrome-flags="--headless --no-sandbox" >/dev/null 2>&1 || true
            jq -r '
              "ТЋѕУЃйтѕєТЋИ: \((.categories.performance.score // 0) * 100 | round)",
              "FCP: \(.audits["first-contentful-paint"].displayValue // "n/a")",
              "LCP: \(.audits["largest-contentful-paint"].displayValue // "n/a")",
              "CLS: \(.audits["cumulative-layout-shift"].displayValue // "n/a")",
              "TBT: \(.audits["total-blocking-time"].displayValue // "n/a")",
              "SpeedIndex: \(.audits["speed-index"].displayValue // "n/a")"
            ' /tmp/lh.json || echo "Lighthouse тЈќтЙЌтц▒ТЋЌ"
            echo "Рћђ Тћ╣тќёТЕЪТюЃ(>100ms):"
            jq -r '.audits | to_entries[] | select(.value.details.type=="opportunity" and .value.details.overallSavingsMs>100) | "  \(.value.title): тЈ»уюЂ \(.value.details.overallSavingsMs|round)ms"' /tmp/lh.json 2>/dev/null || true
          }
          lh "https://lhpedclinic.com.tw/" mobile
          lh "https://lhpedclinic.com.tw/" desktop
          lh "https://lhpedclinic.com.tw/health/shingles-vaccine.html" mobile
          lh "https://lhpedclinic.com.tw/growth.html" mobile

      - name: 7. Live content fingerprint
        run: |
          B=https://lhpedclinic.com.tw
          html=$(curl -s --max-time 20 "$B/team/dr-tsai.html")
          echo "$html" | grep -q "19у»Є" && echo "OK   dr-tsai 19у»Є(07-13 ТЅ╣ти▓СИіуиџ)" || echo "FAIL dr-tsai 19у»Є ТюфУдІ"
          idx=$(curl -s --max-time 20 "$B/")
          echo "$idx" | grep -q "speakable-summary" && echo "OK   index speakable hook ти▓СИіуиџ" || echo "FAIL index speakable hook ТюфУдІ"
          echo "$idx" | grep -qi "googletagmanager" && echo "OK   GA4 ти▓ТјЏУ╝Ѕ" || echo "FAIL GA4 ТюфУдІ"
